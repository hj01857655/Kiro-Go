root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []

  # Windows 上 air 通过当前 shell 启动二进制；某些 PowerShell 主机会把
  # tmp\main.exe / .\tmp\main.exe 当成模块名解析报 CommandNotFoundException。
  # 用 cmd /c 显式包装，cmd 永远把 tmp\main.exe 当成相对路径执行，最稳。
  entrypoint = "cmd /c tmp\\main.exe"
  full_bin = "cmd /c tmp\\main.exe"

  cmd = "go build -o ./tmp/main.exe ."

  delay = 1000

  include_ext = ["go"]

  include_dir = []

  exclude_dir = [
    "assets",
    "tmp",
    "vendor",
    "testdata",
    "web",
    "data",
    "node_modules",
    ".git",
    ".kiro",
    ".codegraph",
    ".github"
  ]

  exclude_file = []
  exclude_regex = ["_test.go"]

  exclude_unchanged = false
  follow_symlink = false

  kill_delay = "500ms"

  log = "build-errors.log"

  poll = false
  poll_interval = 0

  rerun = false
  rerun_delay = 500

  send_interrupt = false
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = true

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true