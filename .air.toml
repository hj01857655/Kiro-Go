root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []

  entrypoint  = "tmp/main.exe"
  full_bin = "tmp/main.exe"

  cmd = "go build -o ./tmp/main.exe ."

  delay = 1000

  include_ext = ["go"]

  include_dir = [
    "auth",
    "config",
    "logger",
    "pool",
    "proxy"
  ]

  exclude_dir = [
    "assets",
    "tmp",
    "vendor",
    "testdata",
    "web",
    "data",
    ".git"
  ]

  exclude_file = []
  exclude_regex = ["_test.go"]

  exclude_unchanged = false
  follow_symlink = false

  kill_delay = "500ms"

  log = "build-errors.log"

  poll = false
  poll_interval = 0

  rerun = false
  rerun_delay = 500

  send_interrupt = true
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = true

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true